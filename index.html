<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hub</title>
<link rel="icon" type="image/png" href="https://raw.githubusercontent.com/Juan-OM26/ls.operamente.html/main/public/OM%20Logoo.png">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/Juan-OM26/ls.operamente.html/main/public/OM%20Logoo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@100..900&display=swap" rel="stylesheet">
<style>
/* ============================================================
   OPERAMENTE HUB — TEMPLATE BASE
   ============================================================
   Este archivo es el TEMPLATE que se reutiliza para cada cliente.
   Para instalar el Hub a un cliente nuevo:
   1. Copiar este archivo completo
   2. Ir a la sección "CONFIG AGENTES" en el <script> y editar
      el array AGENTES con los agentes que ese cliente tiene
   3. Cambiar SUPABASE_URL / SUPABASE_KEY si el cliente tiene
      su propia instancia de Supabase
   4. Cambiar el logo y LOGIN_PASSWORD si aplica
   No hace falta tocar CSS ni estructura HTML para un cliente nuevo.
   ============================================================ */

/* ── 1. TOKENS DE MARCA (paleta + tema claro/oscuro) ── */
:root {
  --grad: linear-gradient(135deg, #7C3FED, #F52F83);
  --acc:  #7C3FED;
  --pink: #F52F83;
  --grn:  #6EE7C9;
  --amb:  #f5be5a;
  --red:  #ee6c6c;
}
[data-theme="dark"] {
  --bg:        #06070d;
  --glass-1:   rgba(255,255,255,0.05);
  --glass-2:   rgba(255,255,255,0.015);
  --glass-b:   rgba(255,255,255,0.09);
  --glass-b2:  rgba(255,255,255,0.08);
  --tx:        #ffffff;
  --tx-sub:    rgba(255,255,255,0.85);
  --tx-mut:    rgba(255,255,255,0.45);
  --tx-faint:  rgba(255,255,255,0.35);
  --tile-bg:   rgba(255,255,255,0.04);
  --tile-b:    rgba(255,255,255,0.08);
  --accent-lbl: rgba(180,140,240,0.85);
  --glow-1:    rgba(106,45,226,0.1);
  --glow-2:    rgba(245,47,131,0.06);
}
[data-theme="light"] {
  --bg:        #f4f3fb;
  --glass-1:   rgba(255,255,255,0.7);
  --glass-2:   rgba(255,255,255,0.4);
  --glass-b:   rgba(20,10,40,0.08);
  --glass-b2:  rgba(20,10,40,0.07);
  --tx:        #1a1830;
  --tx-sub:    rgba(26,24,48,0.8);
  --tx-mut:    rgba(26,24,48,0.5);
  --tx-faint:  rgba(26,24,48,0.4);
  --tile-bg:   rgba(255,255,255,0.55);
  --tile-b:    rgba(20,10,40,0.08);
  --accent-lbl: #6A2DE2;
  --glow-1:    rgba(106,45,226,0.07);
  --glow-2:    rgba(245,47,131,0.04);
}

/* ── 2. RESET Y BASE ── */
* { margin:0; padding:0; box-sizing:border-box; }
html { font-size:14px; }
body {
  background:var(--bg); color:var(--tx); font-family:'Inter',sans-serif;
  min-height:100vh; overflow-x:hidden; transition:background 0.3s,color 0.3s;
}

/* ── 3. WRAPPER Y GLOWS DE FONDO ── */
.wrap { max-width:1100px; margin:0 auto; padding:48px 44px 60px; position:relative; z-index:1; }
.bg-glow-1 { position:fixed; top:-180px; left:15%; width:560px; height:560px; background:radial-gradient(circle,var(--glow-1),transparent 65%); filter:blur(10px); pointer-events:none; z-index:0; }
.bg-glow-2 { position:fixed; bottom:-160px; right:8%; width:480px; height:480px; background:radial-gradient(circle,var(--glow-2),transparent 65%); filter:blur(10px); pointer-events:none; z-index:0; }

/* ── 4. HEADER ── */
.header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:28px; flex-wrap:wrap; gap:14px; }
.brand-sub { font-size:11px; color:var(--tx-faint); letter-spacing:2px; text-transform:uppercase; font-weight:500; margin-bottom:6px; }
.brand-title { font-family:'Fraunces',serif; font-size:32px; font-weight:500; color:var(--tx); letter-spacing:-0.5px; }
.header-right { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.pill-btn {
  font-size:11px; color:var(--tx-mut); background:var(--tile-bg); border:0.5px solid var(--tile-b);
  padding:6px 14px; border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:4px;
  transition:all 0.15s; user-select:none; white-space:nowrap;
}
.pill-btn:hover { border-color:rgba(180,140,240,0.4); color:var(--tx-sub); }
.lang-opt { opacity:0.45; transition:opacity 0.15s,color 0.15s; }
.lang-opt.on { opacity:1; color:var(--tx); font-weight:600; }

/* ── 5. SUMMARY CARD (agentes activos / última actividad / periodo) ── */
.summary-card {
  background:linear-gradient(165deg,var(--glass-1),var(--glass-2)); backdrop-filter:blur(20px);
  border:0.5px solid var(--glass-b); border-radius:22px; padding:28px 34px;
  box-shadow:0 20px 50px rgba(0,0,0,0.25); margin-bottom:24px;
}
.summary-top { display:flex; align-items:center; gap:48px; margin-bottom:20px; flex-wrap:wrap; }
.summary-label { font-size:10px; color:var(--accent-lbl); letter-spacing:1.2px; text-transform:uppercase; font-weight:600; margin-bottom:8px; }
.summary-val { font-family:'Fraunces',serif; font-size:28px; font-weight:500; color:var(--tx); letter-spacing:-0.5px; }
.summary-activity-txt { font-size:15px; color:var(--tx-sub); font-weight:300; }
.summary-bottom { border-top:0.5px solid var(--glass-b2); padding-top:20px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:14px; }
.period-selector { display:flex; gap:2px; background:rgba(255,255,255,0.03); border:0.5px solid var(--glass-b2); border-radius:32px; padding:4px; }
[data-theme="light"] .period-selector { background:rgba(20,10,40,0.03); }
.period-opt { padding:9px 18px; font-size:12px; color:var(--tx-mut); border-radius:30px; cursor:pointer; transition:all 0.25s; font-weight:400; user-select:none; }
.period-opt:hover { color:var(--tx-sub); }
.period-opt.active { color:#fff; background:var(--grad); box-shadow:0 0 18px rgba(124,63,237,0.4); font-weight:500; }

/* ── 6. HELP TOOLTIP (?) — mismo patrón que Hunter, puro CSS hover.
   Posición por defecto: centrado debajo del botón, vía CSS puro
   (funciona siempre, sin depender de JS). JS solo lo CORRIGE si
   se saldría de la pantalla por algún borde (ver ajustarTooltip). */
.help-wrap { position:relative; display:inline-flex; align-items:center; flex-shrink:0; }
.help-btn {
  width:16px; height:16px; border-radius:50%; border:0.5px solid var(--tx-mut); background:transparent;
  color:var(--tx-mut); font-size:9px; cursor:default; display:flex; align-items:center; justify-content:center;
  opacity:0.6; transition:opacity 0.15s; font-family:'Inter',sans-serif; line-height:1;
}
.help-wrap:hover .help-btn { opacity:1; }
.help-box {
  display:none; position:absolute; top:calc(100% + 8px); left:50%; transform:translateX(-50%);
  width:240px; background:var(--bg); border:0.5px solid var(--glass-b); border-radius:10px; padding:13px 15px;
  font-size:11px; font-weight:400; color:var(--tx-sub); line-height:1.6; z-index:9999;
  box-shadow:0 12px 32px rgba(0,0,0,0.5); pointer-events:none;
  text-transform:none; letter-spacing:normal; font-family:'Inter',sans-serif;
}
[data-theme="light"] .help-box { background:#fff; border-color:rgba(20,10,40,0.12); box-shadow:0 12px 32px rgba(0,0,0,0.15); }
.help-wrap:hover .help-box { display:block; }
.help-box-fixed { display:block !important; position:fixed !important; transform:none !important; }

/* ── 7. AGENT TILE (reposo) ── */
.agent-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:0; }
.agent-tile {
  position:relative; aspect-ratio:1/1; border-radius:22px; background:var(--tile-bg); border:0.5px solid var(--tile-b);
  display:flex; flex-direction:column; justify-content:space-between; padding:22px;
  cursor:pointer; transition:transform 0.3s cubic-bezier(0.16,1,0.3,1), border-color 0.3s;
}
.agent-tile:hover, .agent-tile.tap-active { transform:translateY(-2px); border-color:rgba(180,140,240,0.35); }
.agent-tile-head { display:flex; align-items:flex-start; gap:10px; }
.agent-icon { width:32px; height:32px; border-radius:9px; background:var(--grad); display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:600; color:#fff; box-shadow:0 0 16px rgba(124,63,237,0.4); flex-shrink:0; }
.agent-icon.pending { background:var(--tile-bg); color:var(--tx-mut); box-shadow:none; }
.agent-tile-name { font-size:13px; color:var(--tx); font-weight:500; }
.agent-tile-desc { font-size:10px; color:var(--tx-mut); font-weight:300; margin-top:1px; }
.agent-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; margin-top:4px; }
.agent-dot.activo { background:var(--grn); box-shadow:0 0 8px var(--grn); }
.agent-dot.pendiente { background:var(--amb); }
.agent-main-num { font-family:'Fraunces',serif; font-size:42px; font-weight:500; color:var(--tx); letter-spacing:-1px; line-height:1; margin-bottom:4px; }
.agent-main-num.empty { color:var(--tx-faint); }
.agent-main-lbl { font-size:10px; color:var(--tx-mut); letter-spacing:0.3px; text-transform:uppercase; }

/* ── 8. PANEL DE DETALLE (revelado al hover/tap) ──
   Vive en #panels-container, separado de la grid de tiles, para que
   al abrirse ocupe el ancho COMPLETO (no solo 1/3 de una columna). */
#panels-container { display:flex; flex-direction:column; }
.agent-panel {
  max-height:0; opacity:0; overflow:hidden;
  transition:max-height 0.45s cubic-bezier(0.16,1,0.3,1), opacity 0.3s, margin-bottom 0.4s;
  margin-bottom:0;
}
.agent-panel.show { max-height:340px; opacity:1; margin-bottom:18px; }
.panel-inner {
  background:linear-gradient(165deg,var(--glass-1),var(--glass-2)); backdrop-filter:blur(20px);
  border:0.5px solid var(--glass-b); border-radius:20px; padding:28px 32px;
  display:flex; flex-direction:column; gap:18px; position:relative;
}
.panel-top { display:flex; align-items:center; gap:36px; flex-wrap:wrap; }
.panel-main-num { font-family:'Fraunces',serif; font-size:36px; font-weight:500; color:var(--tx); letter-spacing:-1px; line-height:1; }
.panel-main-lbl { font-size:10px; color:var(--tx-mut); letter-spacing:0.4px; text-transform:uppercase; margin-top:5px; }
.panel-secondaries { flex:1; display:flex; gap:30px; flex-wrap:wrap; }
.panel-sec-lbl { font-size:9px; color:var(--tx-mut); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; }
.panel-sec-val { font-size:16px; color:var(--tx-sub); font-weight:300; }
.panel-cta { font-size:12px; font-weight:500; display:flex; align-items:center; gap:6px; white-space:nowrap; align-self:flex-start; margin-top:4px; text-decoration:none; }
.panel-cta.cta-violeta { color:#D9C8FB; }
.panel-cta.cta-magenta { color:#F5C2DC; }
.panel-cta.cta-neutro  { color:var(--tx-sub); }
[data-theme="light"] .panel-cta.cta-violeta { color:#6A2DE2; }
[data-theme="light"] .panel-cta.cta-magenta { color:#C2257E; }
[data-theme="light"] .panel-cta.cta-neutro  { color:var(--tx-sub); }
.panel-trend { border-top:0.5px solid var(--glass-b2); padding-top:16px; }
.panel-trend-head { display:flex; justify-content:space-between; margin-bottom:10px; align-items:center; }
.panel-trend-lbl { font-size:9px; color:var(--tx-mut); text-transform:uppercase; letter-spacing:0.5px; display:flex; align-items:center; gap:6px; }
.panel-trend-gran { font-size:9px; color:var(--tx-faint); }
.panel-empty-msg { font-size:11px; color:var(--tx-faint); text-align:center; padding:20px 0; }

/* ── 9. PENDING TILE (Vera u otros agentes sin dashboard aún) ── */
.agent-tile.pending { opacity:0.65; cursor:default; }
.agent-tile.pending:hover { transform:none; border-color:var(--tile-b); }

/* ── 10. LOGIN GATE ── */
.login-overlay { position:fixed; inset:0; z-index:9999; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:20px; }
.login-overlay.hidden { display:none; }
.login-box {
  background:linear-gradient(165deg,var(--glass-1),var(--glass-2)); backdrop-filter:blur(20px);
  border:0.5px solid var(--glass-b); border-radius:24px; padding:40px 36px; width:100%; max-width:380px;
  display:flex; flex-direction:column; align-items:center; gap:26px; box-shadow:0 24px 64px rgba(0,0,0,0.4);
  position:relative; overflow:hidden;
}
.login-box::before { content:""; position:absolute; top:0; left:0; right:0; height:2px; background:var(--grad); }
.login-logo { height:32px; opacity:0.92; }
.login-title { font-family:"Fraunces",serif; font-size:20px; font-weight:500; letter-spacing:-0.3px; color:var(--tx); text-align:center; line-height:1.3; }
.login-sub { font-size:11px; color:var(--tx-mut); text-align:center; margin-top:-18px; }
.login-field { width:100%; display:flex; flex-direction:column; gap:6px; }
.login-field label { font-size:10px; color:var(--tx-mut); letter-spacing:0.12em; text-transform:uppercase; }
.login-input { width:100%; background:var(--tile-bg); border:0.5px solid var(--tile-b); border-radius:10px; color:var(--tx); padding:12px 16px; font-size:14px; font-family:"Inter",sans-serif; outline:none; transition:border-color 0.15s; }
.login-input:focus { border-color:var(--acc); }
.login-input.error { border-color:var(--red); animation:loginShake 0.4s ease; }
@keyframes loginShake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)} }
.login-error { font-size:11px; color:var(--red); text-align:center; min-height:16px; }
.login-btn { width:100%; background:var(--grad); border:none; border-radius:10px; color:white; font-family:"Fraunces",serif; font-size:16px; font-weight:500; padding:13px; cursor:pointer; transition:opacity 0.2s,transform 0.15s; }
.login-btn:hover { opacity:0.9; transform:translateY(-1px); }
.login-footer { font-size:10px; color:var(--tx-faint); letter-spacing:0.1em; }

/* ── 12. FOOTER "POWERED BY OPERAMENTE" ──
   Esta franja es la marca de Operamente como proveedor del Hub.
   Se mantiene igual al instalar el template para un cliente nuevo. */
.hub-footer { margin-top:40px; display:flex; flex-direction:column; align-items:center; gap:18px; }
.hub-footer-line { width:100%; height:0.5px; background:var(--glass-b2); }
.hub-footer-text { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--tx-faint); letter-spacing:0.3px; }
#footer-logo { height:22px; opacity:0.8; }

/* ── 13. RESPONSIVE / MOBILE ──
   En mobile no hay hover real, por eso el panel se abre/cierra con
   tap (vía JS, función onTileTap -> abrirPanel). Layout pasa a
   columna única para los tiles; el panel sigue a ancho completo. */
@media(max-width:768px){
  .wrap { padding:28px 18px 40px; }
  .header { flex-direction:column; align-items:flex-start; }
  .summary-top { flex-direction:column; align-items:flex-start; gap:16px; }
  .agent-grid { grid-template-columns:1fr; }
  .agent-tile { aspect-ratio:auto; min-height:140px; }
  .panel-top { flex-direction:column; align-items:stretch; gap:16px; }
  .panel-secondaries { gap:18px 22px; width:100%; }
  .panel-cta { align-self:flex-end; margin-top:0; }
}
</style>
</head>
<body>

<!-- ============================================================
     LOGIN GATE
     ============================================================ -->
<div class="login-overlay" id="login-gate">
  <div class="login-box">
    <img id="login-logo" src="https://operamente-github.jdray1.easypanel.host/logo/Operamente.png" alt="Operamente" class="login-logo">
    <div class="login-title" id="t-login-title">Hub Operamente</div>
    <div class="login-sub" id="t-login-sub">Acceso restringido · Operamente</div>
    <div class="login-field">
      <label id="t-login-label">Contraseña</label>
      <input class="login-input" id="login-input" type="password" placeholder="············" onkeydown="if(event.key==='Enter')loginSubmit()">
    </div>
    <div class="login-error" id="login-error"></div>
    <button class="login-btn" onclick="loginSubmit()" id="t-login-btn">Ingresar</button>
    <div class="login-footer">operamente.com</div>
  </div>
</div>

<!-- ============================================================
     APP — visible solo después del login
     ============================================================ -->
<div id="app" style="display:none;">

<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="wrap">

  <!-- ── HEADER ── -->
  <div class="header">
    <div>
      <img src="https://operamente-github.jdray1.easypanel.host/logo/Operamente.png" alt="Operamente" id="header-logo" style="height:34px;">
    </div>
    <div class="header-right">
      <div class="pill-btn" id="topbar-date"></div>
      <div class="pill-btn" onclick="toggleLang()"><span class="lang-opt" id="lang-es">ES</span><span style="opacity:0.3">|</span><span class="lang-opt" id="lang-en">EN</span></div>
      <div class="pill-btn" onclick="toggleTheme()"><span id="theme-icon">☀</span><span id="theme-label">Claro</span></div>
    </div>
  </div>

  <!-- ── SUMMARY CARD ── -->
  <div class="summary-card">
    <div class="summary-top">
      <div>
        <div class="summary-label" id="t-agentes-activos">Agentes activos</div>
        <div class="summary-val" id="sum-agentes">— / —</div>
      </div>
      <div style="flex:1">
        <div class="summary-label" id="t-ultima-actividad">Última actividad</div>
        <div class="summary-activity-txt" id="sum-actividad">—</div>
      </div>
    </div>
    <div class="summary-bottom">
      <div class="summary-label" id="t-periodo-hub" style="margin-bottom:0;">Periodo del hub</div>
      <div class="period-selector" id="period-selector">
        <div class="period-opt" data-range="today" id="t-period-today">Hoy</div>
        <div class="period-opt active" data-range="week" id="t-period-week">Semana</div>
        <div class="period-opt" data-range="month" id="t-period-month">Mes</div>
        <div class="period-opt" data-range="quarter" id="t-period-quarter">Q</div>
        <div class="period-opt" data-range="year" id="t-period-year">Año</div>
      </div>
    </div>
  </div>

  <!-- ============================================================
       AGENT TILES — generados dinámicamente por JS desde el array
       AGENTES (ver sección "CONFIG AGENTES" en el <script> abajo).
       Este <div> queda vacío en el HTML; renderAgentTiles() lo llena
       con: 1) el panel de detalle (arriba, oculto por defecto),
       2) la grid de tiles (abajo, siempre visible).
       ============================================================ -->
  <div id="agents-container"></div>

  <!-- ── FOOTER — "Powered by Operamente". Para un cliente nuevo,
       este footer se mantiene igual (es la marca de Operamente como
       proveedor, no la del cliente). ── -->
  <div class="hub-footer">
    <div class="hub-footer-line"></div>
    <div class="hub-footer-text">
      <span id="t-powered-by">Powered by</span>
      <img src="https://operamente-github.jdray1.easypanel.host/logo/Operamente.png" alt="Operamente" id="footer-logo">
    </div>
  </div>

</div>
</div>

<script>
/* ============================================================
   SECCIÓN A — CONFIGURACIÓN DEL CLIENTE
   ============================================================
   ESTA ES LA ÚNICA SECCIÓN QUE SE EDITA AL INSTALAR EL HUB
   PARA UN CLIENTE NUEVO. Todo lo demás en este archivo es
   lógica genérica que no depende de qué agentes tenga el cliente.

   Para agregar/quitar un agente: edita el array AGENTES abajo.
   Cada agente necesita:
     id          — identificador único, usado internamente (sin espacios)
     nombre      — nombre visible en el tile
     descripcion — subtítulo corto bajo el nombre
     color       — 'violeta' | 'magenta' | 'neutro' (acento visual del ícono)
     estado      — 'activo' | 'pendiente' (pendiente = tile atenuado, sin datos)
     urlCompleto — link al dashboard completo de ese agente
     fuente      — 'webhook' | 'supabase' | 'ninguna' (de dónde lee sus datos)
     webhookUrl  — (solo si fuente='webhook') URL del endpoint de resumen en n8n
     metricaLbl  — etiqueta del número principal, ej. 'leads', 'llamadas'
     secundarias — array de {clave, label} que se muestran en el panel detalle
   ============================================================ */

const AGENTES = [
  {
    id: 'concierge',
    nombre: 'Concierge',
    descripcion: { es: 'agenda citas por WhatsApp', en: 'books appointments via WhatsApp' },
    color: 'violeta',
    estado: 'activo',
    urlCompleto: 'https://concierge.operamente.com',
    fuente: 'webhook',
    webhookUrl: 'https://operamente-n8n.jdray1.easypanel.host/webhook/hub-resumen-concierge',
    metricaLbl: { es: 'leads', en: 'leads' },
    secundarias: [
      { clave: 'citas_confirmadas', label: { es: 'Citas confirmadas', en: 'Confirmed appointments' }, formato: 'numero' },
      { clave: 'booking_rate',      label: { es: 'Booking rate', en: 'Booking rate' },               formato: 'porcentaje' },
      { clave: 'pipeline_eur',      label: { es: 'Pipeline', en: 'Pipeline' },                        formato: 'eur' },
    ],
  },
  {

function cerrarPanel() {
  if (openAgentId) document.getElementById('panel-' + openAgentId)?.classList.remove('show');
  openAgentId = null;
}

function onTileTap(agenteId) {
  const isTouch = window.matchMedia('(hover: none)').matches;
  if (!isTouch) return; /* en desktop el hover ya hace el trabajo, ver attachHoverHandlers */
  const agente = AGENTES.find(a => a.id === agenteId);
  if (!agente || agente.estado === 'pendiente') return;
  abrirPanel(agenteId);
}

/* En desktop usamos hover real sobre el tile para ABRIR su panel.
   El panel ya NO se cierra al quitar el cursor — se queda abierto
   hasta que el usuario pase el cursor sobre otro tile (cambia de
   panel) o haga clic fuera de cualquier tile/panel (se cierra). */
function attachHoverHandlers() {
  AGENTES.forEach(agente => {
    if (agente.estado === 'pendiente') return;
    const tile = document.getElementById('tile-' + agente.id);
    if (!tile) return;
    tile.addEventListener('mouseenter', () => {
      if (window.matchMedia('(hover: none)').matches) return;
      abrirPanel(agente.id);
    });
  });
}

/* Clic en cualquier parte que NO sea un tile ni un panel = cerrar */
document.addEventListener('click', (e) => {
  if (window.matchMedia('(hover: none)').matches) return; /* en mobile esto lo maneja onTileTap */
  const dentroDeTile = e.target.closest('.agent-tile');
  const dentroDePanel = e.target.closest('.agent-panel');
  if (!dentroDeTile && !dentroDePanel) cerrarPanel();
});

/* ── TOOLTIP (?) — el CSS centra el cuadro debajo del botón por
   defecto. Pero como algunos "?" viven dentro de .agent-panel
   (que tiene overflow:hidden para su animación de altura), el
   tooltip se recortaría ahí. Por eso, al abrir, lo movemos
   temporalmente a <body> con position:fixed — así escapa de
   cualquier overflow:hidden de sus ancestros — y lo devolvemos
   a su lugar original al cerrar.
   Se usa mouseenter/mouseleave (no burbujean) sobre cada .help-wrap
   individual vía delegación con capture, para que sea robusto sin
   depender de relatedTarget. */
function abrirTooltip(wrap) {
  if (tooltipActivo === wrap) return;
  cerrarTooltipActivo();
  const box = wrap.querySelector('.help-box');
  const btn = wrap.querySelector('.help-btn');
  if (!box || !btn) return;

  tooltipActivo = wrap;
  tooltipOriginalParent = box.parentNode;
  tooltipOriginalNextSibling = box.nextSibling;
  document.body.appendChild(box);
  box.classList.add('help-box-fixed');

  const bRect = btn.getBoundingClientRect();
  const boxW = 240;
  const margen = 16;
  let left = bRect.left + (bRect.width / 2) - (boxW / 2);
  left = Math.max(margen, Math.min(left, window.innerWidth - boxW - margen));
  box.style.left = `${left}px`;
  box.style.top = `${bRect.bottom + 8}px`;
}

function cerrarTooltipActivo() {
  if (!tooltipActivo) return;
  const box = tooltipActivo.querySelector('.help-box-fixed') || document.querySelector('.help-box-fixed');
  if (box && tooltipOriginalParent) {
    box.classList.remove('help-box-fixed');
    box.style.left = ''; box.style.top = '';
    tooltipOriginalParent.insertBefore(box, tooltipOriginalNextSibling);
  }
  tooltipActivo = null;
}

document.addEventListener('mouseenter', (e) => {
  if (window.matchMedia('(hover: none)').matches) return; /* en mobile el tap maneja esto, ver abajo */
  const wrap = e.target.closest ? e.target.closest('.help-wrap') : null;
  if (wrap) abrirTooltip(wrap);
}, true);

document.addEventListener('mouseleave', (e) => {
  if (window.matchMedia('(hover: none)').matches) return;
  const wrap = e.target.closest ? e.target.closest('.help-wrap') : null;
  if (wrap && wrap === tooltipActivo) cerrarTooltipActivo();
}, true);

/* En mobile no hay hover real: el tap en el botón ? abre/cierra su
   tooltip, y el tap en cualquier otro lugar cierra el que esté abierto. */
document.addEventListener('click', (e) => {
  if (!window.matchMedia('(hover: none)').matches) return; /* en desktop esto lo maneja el hover de arriba */
  const wrap = e.target.closest('.help-wrap');
  if (wrap) {
    e.stopPropagation();
    if (tooltipActivo === wrap) cerrarTooltipActivo();
    else abrirTooltip(wrap);
    return;
  }
  if (tooltipActivo) cerrarTooltipActivo();
}, true);

/* ============================================================
   SECCIÓN F — GRANULARIDAD POR RANGO (genérico)
   Define cuántos puntos de tendencia mostrar y qué representa
   cada uno, según el periodo seleccionado arriba en el Hub.
   ============================================================ */
const GRANULARIDAD = {
  today:   { puntos: 24, unidad: 'hour',  labelKey: 'gran_today' },
  week:    { puntos: 7,  unidad: 'day',   labelKey: 'gran_week' },
  month:   { puntos: 30, unidad: 'day',   labelKey: 'gran_month' },
  quarter: { puntos: 13, unidad: 'week',  labelKey: 'gran_quarter' },
  year:    { puntos: 12, unidad: 'month', labelKey: 'gran_year' },
};

function formatVal(valor, formato) {
  if (valor === null || valor === undefined) return '—';
  if (formato === 'porcentaje') return valor + '%';
  if (formato === 'eur') return Number(valor).toLocaleString(currentLang === 'en' ? 'en-US' : 'es-ES') + ' EUR';
  return valor;
}

/* ============================================================
   SECCIÓN G — MINI GRÁFICA DE TENDENCIA (SVG generado por JS,
   genérico para cualquier agente — recibe un array de números)
   ============================================================ */
function renderTrendSVG(containerId, valores) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!valores || valores.length < 2 || valores.every(v => v === 0)) {
    el.innerHTML = `<div class="panel-empty-msg" style="padding:10px 0">${t('sin_datos_tendencia')}</div>`;
    return;
  }
  const w = 560, h = 60, max = Math.max(...valores), min = Math.min(...valores);
  const range = (max - min) || 1;
  const step = w / (valores.length - 1);
  const points = valores.map((v, i) => {
    const x = Math.round(i * step);
    const y = Math.round(h - 6 - ((v - min) / range) * (h - 12));
    return `${x},${y}`;
  }).join(' ');
  const lastX = w, lastY = Math.round(h - 6 - ((valores[valores.length-1] - min) / range) * (h - 12));
  el.innerHTML = `
    <svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <polyline points="${points}" fill="none" stroke="#B98FF0" stroke-width="2"/>
      <circle cx="${lastX}" cy="${lastY}" r="4" fill="#F52F83"/>
    </svg>`;
}

/* ============================================================
   SECCIÓN H — CARGA DE DATOS POR AGENTE (genérico, despacha
   según agente.fuente. Para agregar una fuente nueva — por
   ejemplo cuando Vera tenga su webhook — solo se agrega un
   caso nuevo en este switch, sin tocar el resto del archivo)
   ============================================================ */
async function loadAgentData(agente) {
  if (agente.estado === 'pendiente') return;
  try {
    let datos;
    if (agente.fuente === 'webhook') {
      datos = await fetchWebhookResumen(agente);
    } else if (agente.fuente === 'supabase') {
      datos = await fetchSupabaseResumen(agente);
    } else {
      return;
    }
    pintarAgente(agente, datos);
  } catch (e) {
    console.error(`Error cargando ${agente.id}:`, e);
  }
}

function pintarAgente(agente, datos) {
  const main = datos.principal ?? 0;
  document.getElementById(`tile-main-${agente.id}`).textContent = main;
  document.getElementById(`panel-main-${agente.id}`).textContent = main;
  document.getElementById(`panel-rangelbl-${agente.id}`).textContent = t('period_' + currentRange).toLowerCase();
  document.getElementById(`panel-gran-${agente.id}`).textContent = t(GRANULARIDAD[currentRange].labelKey);

  agente.secundarias.forEach(s => {
    const el = document.getElementById(`panel-${s.clave}-${agente.id}`);
    if (el) el.textContent = formatVal(datos[s.clave], s.formato);
  });

  renderTrendSVG(`panel-chart-${agente.id}`, datos.serie || []);
}

/* ── Fuente: webhook n8n (Concierge y futuros agentes con backend propio) ── */
async function fetchWebhookResumen(agente) {
  const res = await fetch(`${agente.webhookUrl}?range=${currentRange}`);
  const d = await res.json();
  return {
    principal: d.leads ?? 0,
    citas_confirmadas: d.citas_confirmadas ?? 0,
    booking_rate: d.booking_rate ?? 0,
    pipeline_eur: d.pipeline_eur ?? 0,
    serie: d.serie || [],
  };
}

/* ── Fuente: Supabase directo (Hunter) ── */
function fechaDesde(range) {
  const now = new Date();
  const d = new Date(now);
  if (range === 'today') d.setHours(0,0,0,0);
  else if (range === 'week') d.setDate(now.getDate()-7);
  else if (range === 'month') d.setDate(now.getDate()-30);
  else if (range === 'quarter') d.setDate(now.getDate()-90);
  else if (range === 'year') d.setDate(now.getDate()-365);
  else d.setDate(now.getDate()-7);
  return d.toISOString();
}

async function fetchSupabaseResumen(agente) {
  const desde = fechaDesde(currentRange);
  const res = await fetch(`${SUPABASE_URL}/rest/v1/leads?select=banda,estado,created_at&created_at=gte.${desde}`, {
    headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` }
  });
  const leads = await res.json();
  if (!Array.isArray(leads)) throw new Error('respuesta inesperada de Supabase');
  return {
    principal: leads.length,
    prioritarios: leads.filter(l => l.banda === 'Priority').length,
    buenos: leads.filter(l => l.banda === 'Good').length,
    contactados: leads.filter(l => l.estado && l.estado !== 'Nuevo').length,
    serie: agruparPorIntervalo(leads.map(l => l.created_at), currentRange),
  };
}

/* Agrupa timestamps en buckets según la granularidad activa — genérico,
   lo puede usar cualquier fuente que devuelva una lista de timestamps */
function agruparPorIntervalo(timestamps, range) {
  const { puntos, unidad } = GRANULARIDAD[range];
  const buckets = new Array(puntos).fill(0);
  const ahora = new Date();
  timestamps.forEach(ts => {
    const fecha = new Date(ts);
    let diff;
    if (unidad === 'hour') diff = Math.floor((ahora - fecha) / 3600000);
    else if (unidad === 'day') diff = Math.floor((ahora - fecha) / 86400000);
    else if (unidad === 'week') diff = Math.floor((ahora - fecha) / (86400000*7));
    else diff = Math.floor((ahora - fecha) / (86400000*30));
    const idx = puntos - 1 - diff;
    if (idx >= 0 && idx < puntos) buckets[idx]++;
  });
  return buckets;
}

function loadAllAgentData() {
  AGENTES.forEach(loadAgentData);
}

function pintarResumenGeneral() {

  document.getElementById('sum-agentes').textContent = `${activos} / ${AGENTES.length}`;
}

/* ============================================================
   SECCIÓN J — INIT
   ============================================================ */
function initApp() {
  pintarResumenGeneral();
  setLang(currentLang); /* dispara applyLang() -> renderAgentTiles() -> loadAllAgentData() */

  document.getElementById('period-selector').addEventListener('click', (e) => {
    const opt = e.target.closest('.period-opt');
    if (!opt) return;
    document.querySelectorAll('.period-opt').forEach(o => o.classList.remove('active'));
    opt.classList.add('active');
    currentRange = opt.dataset.range;
    loadAllAgentData();
  });
}
